services:
  db:
    image: postgres:16
    container_name: sirbuysalot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sirbuysalot
      POSTGRES_USER: sirbuysalot
      POSTGRES_PASSWORD: sirbuysalot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sirbuysalot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sirbuysalot-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/sirbuysalot
      POSTGRES_USER: sirbuysalot
      POSTGRES_PASSWORD: sirbuysalot
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:5173
      SHOW_SQL: "false"
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: sirbuysalot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
