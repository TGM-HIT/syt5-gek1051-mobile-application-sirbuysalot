spring.application.name=SirBuysALot

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:sirbuysalot}
spring.datasource.username=${POSTGRES_USER:sirbuysalot}
spring.datasource.password=${POSTGRES_PASSWORD:sirbuysalot}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Seed data (data.sql) - only runs when tables are empty
spring.sql.init.mode=always

# Server
server.port=8080
