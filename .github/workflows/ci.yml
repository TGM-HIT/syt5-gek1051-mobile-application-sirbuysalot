name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────── Frontend ────────────────────────────
  frontend-lint:
    name: "Frontend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  frontend-typecheck:
    name: "Frontend · Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  frontend-build:
    name: "Frontend · Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  frontend-test:
    name: "Frontend · Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results/junit.xml

      - name: Frontend Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend Tests (100)
          path: frontend/test-results/junit.xml
          reporter: java-junit

  # ──────────────────────────── Backend ─────────────────────────────
  backend-test:
    name: "Backend · Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build & run tests
        run: chmod +x ./mvnw && ./mvnw -B verify -Dspring.profiles.active=test

      - name: Backend Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests (100)
          path: backend/target/surefire-reports/TEST-*.xml
          reporter: java-junit

  # ──────────────────────────── Gate ────────────────────────────────
  ci-pass:
    name: CI ✓
    if: always()
    needs: [frontend-lint, frontend-typecheck, frontend-build, frontend-test, backend-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results=("${{ needs.frontend-lint.result }}" \
                   "${{ needs.frontend-typecheck.result }}" \
                   "${{ needs.frontend-build.result }}" \
                   "${{ needs.frontend-test.result }}" \
                   "${{ needs.backend-test.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::Job failed with result: $r"
              exit 1
            fi
          done
          echo "All jobs passed."
