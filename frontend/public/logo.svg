<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Shopping bag outline -->
  <path d="M160 180 L160 400 Q160 420 180 420 L332 420 Q352 420 352 400 L352 180"
        fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bag handles -->
  <path d="M195 180 Q195 120 256 120 Q317 120 317 180"
        fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>

  <!-- Gold S letter -->
  <text x="256" y="345"
        font-family="Arial Black, Arial, sans-serif"
        font-size="160"
        font-weight="900"
        fill="url(#gold)"
        text-anchor="middle">S</text>

  <!-- Small crown on top -->
  <path d="M226 95 L236 75 L256 90 L276 75 L286 95"
        fill="url(#gold)" stroke="url(#gold)" stroke-width="6" stroke-linejoin="round"/>
</svg>
